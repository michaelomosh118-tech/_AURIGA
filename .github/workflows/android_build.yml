name: AURIGA Professional Build Engine

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        flavor: [ navi, sentinel, aero, industrial ]
        buildType: [ debug, release ]

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    - name: Locate Android Project Root
      id: locate
      run: |
        PROJECT_ROOT=$(find . -name "build.gradle" -not -path "*/app/*" -not -path "*/.git/*" -exec dirname {} \; | head -n 1)
        if [ -z "$PROJECT_ROOT" ]; then
          echo "Error: Could not find build.gradle in the repository!"
          exit 1
        fi
        echo "Found project root at: $PROJECT_ROOT"
        echo "project_root=$PROJECT_ROOT" >> "$GITHUB_OUTPUT"

    - name: Compute Gradle task + output paths
      id: task
      run: |
        FLAVOR="${{ matrix.flavor }}"
        BUILD_TYPE="${{ matrix.buildType }}"
        FLAVOR_CAP="$(echo "${FLAVOR:0:1}" | tr '[:lower:]' '[:upper:]')${FLAVOR:1}"
        BUILD_TYPE_CAP="$(echo "${BUILD_TYPE:0:1}" | tr '[:lower:]' '[:upper:]')${BUILD_TYPE:1}"
        echo "gradle_task=assemble${FLAVOR_CAP}${BUILD_TYPE_CAP}" >> "$GITHUB_OUTPUT"
        echo "apk_subdir=${FLAVOR}/${BUILD_TYPE}" >> "$GITHUB_OUTPUT"

    # ── Phase 1: native YOLOv8n Object Locator ──────────────────────
    # The TFLite model is gitignored (binary blob, ~12 MB) so CI must
    # fetch it before assembling the APK. We export from Ultralytics on
    # the runner, then cache the result so subsequent matrix cells (and
    # subsequent workflow runs) skip the heavy `pip install ultralytics`
    # step and pull the model straight from the actions cache.
    #
    # Cache key bump: change the trailing version (-v1 → -v2) to force
    # a re-export, e.g. when upgrading to YOLOv9 or pinning to a newer
    # Ultralytics release.
    - name: Restore cached YOLOv8n TFLite model
      id: yolo-cache
      uses: actions/cache@v4
      with:
        path: ${{ steps.locate.outputs.project_root }}/app/src/main/assets/yolov8n_float32.tflite
        key: yolov8n-tflite-fp32-v1

    - name: Set up Python (cache miss only)
      if: steps.yolo-cache.outputs.cache-hit != 'true'
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Export YOLOv8n model (cache miss only)
      if: steps.yolo-cache.outputs.cache-hit != 'true'
      working-directory: ${{ runner.temp }}
      run: |
        echo "::group::Install Ultralytics"
        pip install --quiet --no-cache-dir ultralytics
        echo "::endgroup::"
        echo "::group::Export yolov8n.pt → TFLite (640x640 fp32)"
        yolo export model=yolov8n.pt format=tflite imgsz=640
        echo "::endgroup::"
        DEST="${{ steps.locate.outputs.project_root }}/app/src/main/assets/yolov8n_float32.tflite"
        mkdir -p "$(dirname "$DEST")"
        # Ultralytics writes to yolov8n_saved_model/<various>.tflite —
        # grab the float32 export specifically.
        SRC=$(find yolov8n_saved_model -name "yolov8n_float32.tflite" | head -n 1)
        if [ -z "$SRC" ]; then
          echo "::error::Ultralytics export did not produce yolov8n_float32.tflite"
          ls -laR yolov8n_saved_model || true
          exit 1
        fi
        cp "$SRC" "$DEST"
        echo "Exported model copied to: $DEST"

    - name: Verify YOLOv8n model is bundled
      run: |
        DEST="${{ steps.locate.outputs.project_root }}/app/src/main/assets/yolov8n_float32.tflite"
        if [ ! -f "$DEST" ]; then
          echo "::error::YOLO model missing at $DEST after fetch step"
          exit 1
        fi
        SIZE=$(ls -l "$DEST" | awk '{print $5}')
        echo "Bundled YOLO model: $DEST ($SIZE bytes)"

    - name: Build ${{ matrix.flavor }} ${{ matrix.buildType }} APK
      working-directory: ${{ steps.locate.outputs.project_root }}
      run: |
        chmod +x ./gradlew
        ./gradlew --no-daemon ${{ steps.task.outputs.gradle_task }}

    - name: Verify APK Signing
      working-directory: ${{ steps.locate.outputs.project_root }}
      run: |
        APK=$(find "app/build/outputs/apk/${{ steps.task.outputs.apk_subdir }}" -name "*.apk" | head -n 1)
        echo "APK: $APK"
        ls -la "$APK"
        BUILD_TOOLS=$(ls -d "$ANDROID_HOME"/build-tools/*/ | sort -V | tail -n 1)
        echo "Using build-tools at: $BUILD_TOOLS"
        "$BUILD_TOOLS/apksigner" verify --verbose "$APK"

    - name: Upload ${{ matrix.flavor }} ${{ matrix.buildType }} APK
      uses: actions/upload-artifact@v4
      with:
        name: AURIGA-${{ matrix.flavor }}-${{ matrix.buildType }}-APK
        path: "**/app/build/outputs/apk/${{ steps.task.outputs.apk_subdir }}/app-*.apk"
        retention-days: 14
        if-no-files-found: error
