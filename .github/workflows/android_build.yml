name: AURIGA Professional Build Engine (ZIP Mode)

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: 8.5

    - name: Find Project Root and Build APK
      run: |
        # Find where the actual Android project is (where build.gradle lives)
        PROJECT_ROOT=$(find . -name "build.gradle" -not -path "*/app/*" -exec dirname {} \;)
        
        if [ -z "$PROJECT_ROOT" ]; then
          echo "Error: Could not find build.gradle in the repository!"
          exit 1
        fi
        
        echo "Found project root at: $PROJECT_ROOT"
        cd "$PROJECT_ROOT"
        
        # Make the wrapper executable just in case
        chmod +x ./gradlew || true
        
        # Run the build
        gradle assembleDebug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: AURIGA-Debug-APK
        # We use a wildcard ** to find the APK no matter how deep the folder is nested
        path: "**/app/build/outputs/apk/debug/app-debug.apk"
        retention-days: 7
