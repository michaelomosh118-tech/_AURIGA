name: AURIGA Professional Build Engine

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    - name: Locate Android Project Root
      id: locate
      run: |
        PROJECT_ROOT=$(find . -name "build.gradle" -not -path "*/app/*" -not -path "*/.git/*" -exec dirname {} \; | head -n 1)
        if [ -z "$PROJECT_ROOT" ]; then
          echo "Error: Could not find build.gradle in the repository!"
          exit 1
        fi
        echo "Found project root at: $PROJECT_ROOT"
        echo "project_root=$PROJECT_ROOT" >> "$GITHUB_OUTPUT"

    - name: Build Debug APK
      working-directory: ${{ steps.locate.outputs.project_root }}
      run: |
        chmod +x ./gradlew
        ./gradlew --no-daemon assembleDebug

    - name: Verify APK Signing
      working-directory: ${{ steps.locate.outputs.project_root }}
      run: |
        APK=$(find app/build/outputs/apk/debug -name "*.apk" | head -n 1)
        echo "APK: $APK"
        ls -la "$APK"
        # Use the apksigner bundled with build-tools so we fail fast if the
        # APK is not installable.
        BUILD_TOOLS=$(ls -d "$ANDROID_HOME"/build-tools/*/ | sort -V | tail -n 1)
        echo "Using build-tools at: $BUILD_TOOLS"
        "$BUILD_TOOLS/apksigner" verify --verbose "$APK"

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: AURIGA-Debug-APK
        path: "**/app/build/outputs/apk/debug/app-debug.apk"
        retention-days: 14
        if-no-files-found: error
